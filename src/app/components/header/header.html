<header class="bg-dark-bg/85 backdrop-blur-lg sticky top-0 z-40 border-b border-white/5 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-24">
      <div class="flex items-center cursor-pointer transition-transform hover:scale-105 duration-300" routerLink="/">
        <img src="Untitled.png" alt="Herbs & Terps Logo" class="h-20 w-auto mr-4 filter drop-shadow-md">
        <span class="font-bold text-2xl tracking-wide text-white hidden sm:block">Herbs & Terps</span>
      </div>
      <div class="flex items-center space-x-6">
        <a routerLink="/" routerLinkActive="text-accent" [routerLinkActiveOptions]="{exact: true}" class="text-gray-300 hover:text-white transition-colors duration-200 font-medium">Startseite</a>
        <a routerLink="/impressum" routerLinkActive="text-accent" class="text-gray-300 hover:text-white transition-colors duration-200 font-medium">Impressum</a>
      </div>
    </div>
  </div>
</header>
