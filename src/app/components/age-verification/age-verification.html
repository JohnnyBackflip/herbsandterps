@if (!isVerified()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4">
    <div class="bg-card-bg border border-primary-light/30 rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden transform transition-all">
      <div class="p-8 text-center">
        <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-primary mb-6">
          <span class="text-3xl font-bold text-white">18+</span>
        </div>
        
        <h2 class="text-2xl font-bold text-white mb-4">Altersbestätigung erforderlich</h2>
        
        <p class="text-gray-300 mb-8 whitespace-pre-line text-lg">
          Die Inhalte dieser Seite sind nur für Personen ab 18 Jahren geeignet. 
          Bitte bestätige dein Alter, um fortzufahren.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <button 
            (click)="declineAge()"
            class="px-6 py-3 rounded-xl border border-gray-600 text-gray-300 font-medium hover:bg-gray-800 transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 focus:outline-none w-full sm:w-auto">
            Nein, ich bin jünger
          </button>
          
          <button 
            (click)="confirmAge()"
            class="px-6 py-3 rounded-xl bg-primary text-white font-semibold hover:bg-primary-light transition-all shadow-lg hover:shadow-primary/30 focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:outline-none w-full sm:w-auto text-lg">
            Ja, ich bin über 18
          </button>
        </div>
      </div>
      <div class="bg-gray-900/50 px-8 py-4 text-xs text-gray-500 text-center border-t border-gray-800">
        Durch das Klicken auf "Ja, ich bin über 18" bestätigst du, dass du das gesetzliche Mindestalter erreicht hast.
      </div>
    </div>
  </div>
}
